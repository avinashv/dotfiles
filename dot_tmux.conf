unbind C-b
bind-key C-a send-prefix
set -g prefix C-a

# bind | and - for splitting windows
unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

# bind vimkeys for resizing panes
bind -r j resize-pane -D 1
bind -r k resize-pane -U 1
bind -r l resize-pane -R 1
bind -r h resize-pane -L 1

# bind m to maximize/minimize pane
bind -r m resize-pane -Z

# enable mouse
set -g mouse on

# fix clipboard
set -g set-clipboard on

# focus events for nvim
set-option -g focus-events on

# bind R for refreshing the configuration
unbind r
bind r source-file ~/.tmux.conf

# display popups

# make a new tmux session
bind C-n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'

# tmux session selector
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# dotfiles config popup
bind C-d display-menu -T "#[align=centre]Dotfiles" -x C -y C: \
  ".zshrc"            z  "display-popup -E 'nvim ~/.zshrc'" \
  ".tmux.conf"        t  "display-popup -E 'nvim ~/.tmux.conf'" \
  "nvim"              n  "display-popup -E 'nvim ~/.config/nvim/'" \
  "ghostty"           g  "display-popup -E 'nvim ~/.config/ghostty/config'" \
  "Exit"              q  ""

# terminal popup
bind C-t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "zsh"

# plugins

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'catppuccin/tmux' # set catppuccin theme
set -g @catppuccin_flavour 'mocha'

set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# status bar on the bottom
set -g status-position bottom

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
